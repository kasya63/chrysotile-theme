<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Сайт временно недоступен</title>
	<style>
		:root {
			--chrysotile-blue: #0d47a1;
			--chrysotile-blue-dark: #082f6c;
			--chrysotile-dark: #131722;
			--chrysotile-gray: #667085;
			--chrysotile-light: #f5f8ff;
			--chrysotile-border: #dce3f2;
			--chrysotile-surface: #ffffff;
			--chrysotile-max-width: 1240px;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 32px 20px;
			font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
			line-height: 1.45;
			color: var(--chrysotile-dark);
			background: linear-gradient(165deg, #e8eef9 0%, #f3f6fb 45%, #ffffff 100%);
		}
		.card {
			width: min(100%, 520px);
			background: var(--chrysotile-surface);
			border: 1px solid var(--chrysotile-border);
			border-radius: 16px;
			padding: clamp(28px, 5vw, 40px);
			box-shadow: 0 18px 48px rgba(19, 23, 34, 0.08);
		}
		.code {
			margin: 0 0 8px;
			font-size: clamp(2.5rem, 8vw, 3.25rem);
			font-weight: 800;
			letter-spacing: -0.04em;
			color: var(--chrysotile-blue);
			line-height: 1;
		}
		h1 {
			margin: 0 0 12px;
			font-size: clamp(1.2rem, 3vw, 1.45rem);
			font-weight: 700;
			letter-spacing: -0.02em;
			border-top: 3px solid var(--chrysotile-blue);
			padding-top: 14px;
		}
		p {
			margin: 0 0 20px;
			color: var(--chrysotile-gray);
			font-size: 15px;
		}
		.note {
			font-size: 13px;
			margin-bottom: 0;
		}
	</style>
</head>
<body>
	<main class="card" role="main">
		<p class="code" aria-hidden="true">503</p>
		<h1>Сайт временно недоступен</h1>
		<p>Технические работы или перегрузка. Пожалуйста, зайдите чуть позже — мы уже работаем над восстановлением.</p>
		<p class="note">Если вы администратор: проверьте сервер, базу данных и журнал ошибок хостинга.</p>
	</main>
</body>
</html>
